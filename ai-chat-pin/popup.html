<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 400px;
      height: 580px;
      display: flex;
      flex-direction: column;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      background: #fff;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      border-bottom: 1px solid #e5e5e5;
      flex-shrink: 0;
    }

    header h1 { font-size: 13px; font-weight: 600; }

    .header-actions { display: flex; gap: 5px; }

    .btn {
      padding: 4px 9px;
      border-radius: 5px;
      border: 1px solid #d0d0d0;
      background: #f5f5f5;
      cursor: pointer;
      font-size: 11px;
      color: #333;
    }
    .btn:hover { background: #e8e8e8; }
    .btn-danger { border-color: #f0a0a0; background: #fff5f5; color: #c00; min-width: 64px; }
    .btn-danger:hover { background: #ffe0e0; }
    .btn-lang { border-color: #a0b8d0; background: #f0f6ff; color: #aaa; font-weight: 600; min-width: 52px; display: flex; align-items: center; gap: 3px; }
    .lang-sep { color: #ccc; font-weight: 300; }
    .lang-active { color: #1a5cb0; font-weight: 700; }
    .lang-inactive { color: #aaa; font-weight: 400; }

    #pin-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      min-height: 0;
    }

    .empty {
      text-align: center;
      color: #999;
      padding: 40px 20px;
      line-height: 1.6;
    }

    .pin-item {
      border: 1px solid #e5e5e5;
      border-radius: 7px;
      padding: 9px 11px;
      margin-bottom: 7px;
    }
    .pin-item:hover { border-color: #bbb; }

    .pin-meta {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-bottom: 4px;
    }
    .pin-label { font-weight: 600; font-size: 11px; color: #555; }
    .pin-site { font-size: 10px; padding: 1px 6px; border-radius: 3px; font-weight: 600; }
    .pin-site.site-claude { background: #fff0e6; color: #d4590a; }
    .pin-site.site-chatgpt { background: #e6f4ea; color: #1a7f3c; }
    .pin-site.site-gemini { background: #e8f0fe; color: #1a5cb0; }
    .pin-site.site-unknown { background: #f0f0f0; color: #999; }
    .pin-time { font-size: 10px; color: #bbb; margin-left: auto; }

    .pin-text {
      font-size: 12px;
      color: #333;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 72px;
      overflow: hidden;
    }
    .pin-text.expanded { max-height: none; }

    .pin-memo {
      font-size: 11px;
      color: #666;
      background: #fffbe6;
      border-left: 3px solid #e8a000;
      padding: 4px 8px;
      margin-top: 5px;
      border-radius: 0 4px 4px 0;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .pin-actions {
      display: flex;
      gap: 5px;
      margin-top: 7px;
      flex-wrap: wrap;
    }
    .pin-actions button {
      font-size: 11px;
      padding: 2px 7px;
      border-radius: 4px;
      border: 1px solid #d0d0d0;
      background: none;
      cursor: pointer;
      color: #444;
    }
    .pin-actions button:hover { background: #f0f0f0; }
    .pin-actions .del-btn { color: #c00; border-color: #f0a0a0; margin-left: auto; }
    .pin-actions .del-btn:hover { background: #fff0f0; }
    .copied { color: #090 !important; }

    .memo-editor { margin-top: 7px; }
    .memo-input {
      width: 100%;
      height: 58px;
      font-size: 12px;
      padding: 5px 7px;
      border: 1px solid #d0d0d0;
      border-radius: 5px;
      resize: vertical;
      font-family: inherit;
    }
    .memo-editor-actions { display: flex; gap: 5px; margin-top: 4px; }
    .memo-editor-actions button {
      font-size: 11px;
      padding: 2px 9px;
      border-radius: 4px;
      border: 1px solid #d0d0d0;
      background: none;
      cursor: pointer;
    }
    .memo-save-btn { background: #1a1a1a !important; color: #fff !important; border-color: #1a1a1a !important; }

    /* 引き継ぎフッター */
    .handoff-footer {
      border-top: 1px solid #e5e5e5;
      flex-shrink: 0;
      background: #f9f9f9;
    }

    .handoff-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 12px;
      cursor: pointer;
      user-select: none;
    }
    .handoff-header:hover { background: #f0f0f0; }
    .handoff-title { font-size: 12px; font-weight: 600; color: #444; }
    .handoff-toggle { font-size: 11px; color: #999; }

    .handoff-body { padding: 0 12px 10px; display: none; }
    .handoff-body.open { display: block; }

    .handoff-actions { display: flex; gap: 5px; margin-bottom: 6px; }
    .btn-generate {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 5px;
      border: 1px solid #4a90d9;
      background: #eef5ff;
      color: #1a5cb0;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-generate:hover { background: #ddeeff; }
    .btn-copy-handoff {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 5px;
      border: 1px solid #d0d0d0;
      background: none;
      cursor: pointer;
      color: #444;
    }
    .btn-copy-handoff:hover { background: #f0f0f0; }

    #handoff-text {
      width: 100%;
      height: 100px;
      font-size: 11px;
      padding: 6px 8px;
      border: 1px solid #d0d0d0;
      border-radius: 5px;
      resize: vertical;
      font-family: inherit;
      line-height: 1.5;
      color: #333;
      background: #fff;
    }

    .handoff-hint {
      font-size: 10px;
      color: #aaa;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <header>
    <h1>📌 AI Chat Pin</h1>
    <div class="header-actions">
      <button class="btn btn-lang" id="lang-toggle"><span id="lang-ja" class="lang-active">JA</span> <span class="lang-sep">|</span> <span id="lang-en">EN</span></button>
      <button class="btn" id="export-txt">TXT</button>
      <button class="btn" id="export-csv">CSV</button>
      <button class="btn btn-danger" id="clear-all">全削除</button>
    </div>
  </header>

  <div id="pin-list">
    <div class="empty">ピンがありません<br><br>チャット画面でメッセージにホバーすると<br>📌 ボタンが表示されます</div>
  </div>

  <!-- 引き継ぎフッター -->
  <div class="handoff-footer">
    <div class="handoff-header" id="handoff-toggle">
      <span class="handoff-title">🔗 引き継ぎ</span>
      <span class="handoff-toggle" id="handoff-arrow">▲ 開く</span>
    </div>
    <div class="handoff-body" id="handoff-body">
      <div class="handoff-actions">
        <button class="btn-generate" id="btn-generate">自動生成</button>
        <button class="btn-copy-handoff" id="btn-copy-handoff">コピー</button>
      </div>
      <textarea id="handoff-text" placeholder="「自動生成」でピン内容から引き継ぎ文を生成、または直接入力してください。"></textarea>
      <div class="handoff-hint">エクスポート（TXT/CSV）にも引き継ぎ内容が含まれます</div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
