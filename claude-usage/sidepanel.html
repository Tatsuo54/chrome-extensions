<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Claude Usage</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 100%;
      height: 100vh;
      overflow: hidden;
      background: #1a1a1a;
    }
    iframe {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
    .error-state {
      display: none;
      color: #ccc;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      padding: 24px;
      text-align: center;
    }
    .error-state h2 {
      margin-bottom: 12px;
      color: #fff;
    }
    .error-state a {
      color: #d4a574;
    }
  </style>
</head>
<body>
  <iframe 
    id="usage-frame" 
    src="https://claude.ai/settings/usage"
    allow="clipboard-write"
  ></iframe>
  <div class="error-state" id="error">
    <h2>読み込みに失敗</h2>
    <p>claude.aiへの接続に問題があります。</p>
    <p style="margin-top:8px"><a href="https://claude.ai/settings/usage" target="_blank">ブラウザで直接開く</a></p>
  </div>
</body>
</html>
